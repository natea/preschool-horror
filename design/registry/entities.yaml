# Game World Entity Registry
#
# PURPOSE: Single source of truth for all named game-world facts that appear
# in more than one document. Skills check this before writing new content to
# detect cross-doc inconsistencies at authoring time.
#
# RULES:
#   - Only register facts that cross system boundaries. Internal-only facts
#     (a formula used in one GDD only) do NOT need to be registered.
#   - Never delete entries — set status: deprecated instead.
#   - When a value changes: update the value, set revised: to today's date,
#     and add a comment with the old value and which GDD changed it.
#   - source: is the authoritative GDD — the one that "owns" this fact.
#     Other GDDs that reference it list themselves in referenced_by.
#   - When a new GDD references an existing entry, append its path to
#     referenced_by. Do not create a duplicate entry.
#
# WRITTEN BY: /design-system (Phase 5 — after GDD sections are approved)
#             /consistency-check (when resolving conflicts)
# READ BY:    /design-system (Phase 2 — before authoring begins, and after
#               Section C/D writes to conflict-check new entities/formulas)
#             /consistency-check (primary input — grep-first, GDD-second)
#             /review-all-gdds (Phase 1 — baseline for Phase 2 checks)
#             /architecture-review (data structure and interface validation)
#
# SEARCH PATTERNS (for skills using Grep):
#   All entity names:        Grep pattern="^  - name:" path="design/registry/entities.yaml"
#   Specific entity:         Grep pattern="  - name: goblin" path="design/registry/entities.yaml"
#   All items:               Grep pattern="^  - name:" path="design/registry/entities.yaml" (items section)
#   What combat.md owns:     Grep pattern="source: design/gdd/combat.md"
#   What inventory.md uses:  Grep pattern="referenced_by.*inventory"
#   All gold values:          Grep pattern="value_gold:"
#   Deprecated entries:      Grep pattern="status: deprecated"
#
# FORMAT: YAML. Consistent indentation is critical for grep reliability.
#   Sections: entities | items | formulas | constants
#   Each entry: name, status, source, referenced_by[], attributes{}, added, revised

version: 1
last_updated: "2026-04-12"

# ─── ENTITIES ────────────────────────────────────────────────────────────────
# Named game-world objects: enemies, NPCs, characters, factions, bosses.
# Register an entity here when it appears in more than one GDD — e.g., an
# enemy defined in combat.md that also drops items listed in inventory.md.
#
# Required fields: name, status, source, referenced_by, added
# Attribute fields: any key stats that could appear in another GDD
#   (health, damage, drops, faction, etc.)

entities: []

# Example (remove when first real entry is added):
#
# entities:
#   - name: goblin
#     status: active              # active | deprecated
#     source: design/gdd/combat.md
#     referenced_by:
#       - design/gdd/combat.md
#       - design/gdd/inventory.md
#     health: 40
#     damage: 8
#     drops:
#       - item: goblin_arm        # must match an entry in items section
#         qty: 1
#         drop_rate: 0.8          # 0.0–1.0
#     added: 2026-03-26
#     revised: ""


# ─── ITEMS ───────────────────────────────────────────────────────────────────
# Named collectables, equipment, consumables, crafting materials, currency.
# Register an item when its name or value appears in more than one GDD.
#
# Required fields: name, status, source, referenced_by, added
# Attribute fields: value_gold, weight, stackable, category, and any stat
#   modifiers that another system (e.g., economy, crafting) might reference.

items: []

# Example:
#
# items:
#   - name: goblin_arm
#     status: active
#     source: design/gdd/combat.md   # drop defined in combat GDD
#     referenced_by:
#       - design/gdd/combat.md
#       - design/gdd/inventory.md    # inventory GDD lists its weight/stack rules
#       - design/gdd/economy.md      # economy GDD references its sell price
#     value_gold: 5
#     weight: 1
#     stackable: true
#     category: crafting_material
#     added: 2026-03-26
#     revised: ""


# ─── FORMULAS ────────────────────────────────────────────────────────────────
# Named calculations with defined variables and output ranges.
# Register a formula when its output feeds into another system's input,
# or when another GDD references it by name.
#
# Required fields: name, status, source, referenced_by, variables[],
#   output_range[min, max], added
# Optional: expression (the actual formula), notes

formulas:
  - name: night_timer
    status: active
    source: design/gdd/night-progression.md
    referenced_by:
      - design/gdd/night-progression.md
      - design/gdd/hud-ui-system.md
    variables:
      - BASE_DURATION
      - DURATION_DECREMENT
      - n
    output_range: [420, 600]
    expression: "BASE_DURATION - (n - 1) * DURATION_DECREMENT"
    notes: "Night duration in seconds. Night 1 = 600s, Night 7 = 420s. Linear
      decrease. Feeds into HUD timer display and grace period trigger."
    added: 2026-04-11
    revised: ""

  - name: anomaly_target
    status: active
    source: design/gdd/night-progression.md
    referenced_by:
      - design/gdd/night-progression.md
      - design/gdd/anomaly-placement-engine.md
    variables:
      - ANOMALY_BASE
      - ANOMALY_SCALE
      - n
    output_range: [3, 12]
    expression: "ANOMALY_BASE + floor(ANOMALY_SCALE * (n - 1))"
    notes: "Total anomaly count per night. Clamped at total available spawn
      slots. Output feeds into Anomaly Placement Engine."
    added: 2026-04-11
    revised: ""

  - name: monster_count
    status: active
    source: design/gdd/night-progression.md
    referenced_by:
      - design/gdd/night-progression.md
      - design/gdd/anomaly-placement-engine.md
    variables:
      - MONSTER_BASE
      - MONSTER_SCALE
      - n
    output_range: [0, 3]
    expression: "0 if n<3, MONSTER_BASE if n==3, MONSTER_BASE + floor(MONSTER_SCALE * (n-3)) if n>3"
    notes: "Active monster count per night. Nights 1-2 = 0, Night 3 = 1,
      Night 7 = 3. Output feeds into Monster AI."
    added: 2026-04-11
    revised: ""

  - name: room_anomaly_allocation
    status: active
    source: design/gdd/anomaly-placement-engine.md
    referenced_by:
      - design/gdd/anomaly-placement-engine.md
    variables:
      - active_spawn_slots
      - hotspot_modifier
      - monster_cap_modifier
      - anomaly_target_env
    output_range: [0, 8]
    expression: "floor(T_env * (S * H * M) / total_weight), remainder by fractional part"
    notes: "Per-room environmental anomaly count. Template Mode only — Fixed Mode
      uses hand-authored counts. Output clamped to active_spawn_slots."
    added: 2026-04-11
    revised: ""

  - name: severity_tier_allocation
    status: active
    source: design/gdd/anomaly-placement-engine.md
    referenced_by:
      - design/gdd/anomaly-placement-engine.md
    variables:
      - anomaly_target
      - monster_count
      - PCT_T3
      - PCT_T2
    output_range: [0, 12]
    expression: "t3_raw=floor(AT*PCT_T3), t3_env=max(0,t3_raw-MC), t2_env=floor(AT*PCT_T2), t1_env=AT-MC-t3_env-t2_env"
    notes: "Global severity tier counts per night. Monsters consume Tier 3 budget
      first. t1_env absorbs rounding remainder. Guard: clamp t1_env >= 0."
    added: 2026-04-11
    revised: ""

  - name: footstep_rate
    status: active
    source: design/gdd/audio-system.md
    referenced_by:
      - design/gdd/audio-system.md
    variables:
      - STEP_STRIDE_LENGTH
      - current_speed
    output_range: [0.2, "inf"]
    expression: "STEP_STRIDE_LENGTH / current_speed"
    notes: "Controls footstep audio pacing. Walk: 0.4s, Camera Raised: 0.53s,
      Run: 0.2s. Division guarded at speed 0 (no footstep fires)."
    added: 2026-04-10
    revised: ""

  - name: active_spawn_slots
    status: active
    source: design/gdd/room-level-management.md
    referenced_by:
      - design/gdd/room-level-management.md
      - design/gdd/anomaly-placement-engine.md
    variables:
      - base_spawn_slots
      - tier_multiplier
    output_range: [0, 8]
    expression: "floor(base_spawn_slots(R) * tier_multiplier(N))"
    notes: "Controls anomaly density per room per night. Output feeds into
      Anomaly Placement Engine. Zero is a valid output (no anomalies in that
      room that night)."
    added: 2026-04-09
    revised: ""

  - name: debrief_dwell_time
    status: active
    source: design/gdd/hud-ui-system.md
    referenced_by:
      - design/gdd/hud-ui-system.md
      - design/gdd/evidence-submission.md
    variables:
      - T_fade_per_line
      - N_lines
      - T_pause_pre_grade
      - T_post_grade
      - T_post_pay
      - T_post_directive
    output_range: [1.7, 3.7]
    expression: "(T_fade_per_line * N_lines) + T_pause_pre_grade + T_post_grade + T_post_pay + T_post_directive"
    notes: "Minimum time before Continue Prompt appears in Boss Debrief.
      Evidence Submission must wait for T_dwell before allowing player input.
      Typical at N_lines=3: ~2.3s."
    added: 2026-04-11
    revised: ""

  - name: photo_score
    status: active
    source: design/gdd/anomaly-system.md
    referenced_by:
      - design/gdd/anomaly-system.md
      - design/gdd/photography-system.md
    variables:
      - photo_score_base
      - in_frame_ratio
      - facing_score
      - distance_score
    output_range: [0.0, 1.0]
    expression: "photo_score_base * in_frame_ratio * facing_score * distance_score"
    notes: "Composite photo quality score per anomaly. Photography System consumes
      this to grade photos. Evidence Submission uses the grade. Threshold for
      detection: PHOTO_SCORE_THRESHOLD (0.15)."
    added: 2026-04-12
    revised: ""

  - name: night_evidence_score
    status: active
    source: design/gdd/photography-system.md
    referenced_by:
      - design/gdd/photography-system.md
      - design/gdd/evidence-submission.md
    variables:
      - unique_best_scores
      - total_anomalies_this_night
    output_range: [0.0, 1.0]
    expression: "sum(unique_best_scores) / max(1, total_anomalies_this_night)"
    notes: "Aggregate evidence quality for the night. Evidence Submission consumes
      this to determine boss grade, tone, and pay. Divides by total anomalies
      (not just photographed) — rewards comprehensive coverage."
    added: 2026-04-12
    revised: ""

