      - design/gdd/evidence-submission.md
    value: "[0.70,0.50,0.30,0.15]"
    unit: score
    notes: "Night evidence grade thresholds: A>=0.70, B>=0.50, C>=0.30, D>=0.15,
      F<0.15. Applied to night_evidence_score. Evidence Submission uses night grade
      to determine boss tone and pay."
    added: 2026-04-12
    revised: ""

  - name: night_pay
    status: active
    source: design/gdd/evidence-submission.md
    referenced_by:
      - design/gdd/evidence-submission.md
    variables:
      - n
      - G
      - BASE_PAY_TABLE
      - GRADE_MULTIPLIER
    output_range: [0, 750]
    expression: "floor(BASE_PAY_TABLE[n] * GRADE_MULTIPLIER[G])"
    notes: "Pay awarded per night. n=night index (0-based into BASE_PAY_TABLE),
      G=night grade letter (A-F). Zero photos → pay = $0 regardless of formula.
      Night 7 (win path) has no grading or pay."
    added: 2026-04-12
    revised: ""

  - name: boss_anger_update
    status: active
    source: design/gdd/evidence-submission.md
    referenced_by:
      - design/gdd/evidence-submission.md
    variables:
      - boss_anger_prev
      - G
      - n
      - BASE_GRADE_DELTA
      - NIGHT_PRESSURE_BONUS
    output_range: [0, 10]
    expression: "clamp(boss_anger_prev + BASE_GRADE_DELTA[G] + NIGHT_PRESSURE_BONUS[n], 0, 10)"
    notes: "Boss anger is a 0–10 integer that drives dialogue tone bands:
      CALM(0-2), IRRITATED(3-5), THREATENING(6-8), FURIOUS(9-10).
      Initial value: 0. Updated once per night after grading."
    added: 2026-04-12
    revised: ""

