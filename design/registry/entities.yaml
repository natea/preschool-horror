    value: "[200, 200, 350, 350, 600, 600]"
    unit: dollars
    notes: "Base pay per night (nights 1-6, 0-indexed). Grouped in pairs:
      nights 1-2 = $200, nights 3-4 = $350, nights 5-6 = $600.
      Multiplied by GRADE_MULTIPLIER to get final night_pay."
    added: 2026-04-12
    revised: ""

